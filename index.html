<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="materials/icon.png" type="image/x-icon">
<title>Chrono One</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

.container{
max-width:600px;
padding:40px;
animation:fade 1.5s ease;
}

h1{
font-size:90px;
color:#fd3333;
margin-bottom:10px;
}

h2{
font-size:28px;
margin-bottom:15px;
}

p{
opacity:.85;
line-height:1.6;
margin-bottom:25px;
}

.contact{
display:inline-block;
padding:12px 28px;
background:#ff2222;
color:#0f172a;
text-decoration:none;
border-radius:25px;
font-weight:bold;
transition:.3s;
}

.contact:hover{
transform:scale(1.05);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.footer{
position:absolute;
bottom:20px;
font-size:13px;
opacity:.5;
}
</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Site Temporarily Unavailable</h2>

<p>
This website is temporarily unavailable while updates are being completed. Please check back soon.
</p>


</div>

<div class="footer">
Thank you for your patience.
</div>

</body>
</html>
